bind-interfaces
interface=eth1
interface=eth2

# leaf1 uplink: 10.0.1.0/30 (spine=10.0.1.2, leaf1=10.0.1.1)
dhcp-range=set:net1,10.0.1.1,10.0.1.1,255.255.255.252,12h
dhcp-option=tag:net1,option:router,10.0.1.2

# leaf2 uplink: 10.0.2.0/30 (spine=10.0.2.2, leaf2=10.0.2.1)
dhcp-range=set:net2,10.0.2.1,10.0.2.1,255.255.255.252,12h
dhcp-option=tag:net2,option:router,10.0.2.2
