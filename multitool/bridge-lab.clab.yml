name: multitool-bridge
prefix: ""

topology:
  kinds:
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    spine1:
      kind: linux
      exec:
        - ip link add name br0 type bridge
        - ip link set br0 up
        - ip link set eth1 master br0
        - ip link set eth2 master br0
    client1:
      kind: linux
      exec:
        - ip link set address 00:c1:ab:00:00:05 dev eth1
        - ip addr add 192.168.0.1/24 dev eth1
    client2:
      kind: linux
      exec:
        - ip link set address 00:c1:ab:00:00:06 dev eth1
        - ip addr add 192.168.0.2/24 dev eth1

  links:
    - endpoints: ["client1:eth1", "spine1:eth1"]
    - endpoints: ["client2:eth1", "spine1:eth2"]
