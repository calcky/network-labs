name: openwrt-L3
prefix: ""

topology:
  kinds:
    openwrt:
      image: vrnetlab/openwrt_openwrt:21.02.3
      env:
        USERNAME: root
        PASSWORD: rocks
        PACKAGES: ""
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    spine1:
      kind: linux
      binds:
        - spine1-dnsmasq.conf:/etc/dnsmasq-spine.conf
      exec:
        - ip addr add 10.0.1.2/30 dev eth1
        - ip addr add 10.0.2.2/30 dev eth2
        - sysctl -w net.ipv4.ip_forward=1
        - ip route add 192.168.1.0/24 via 10.0.1.1
        - ip route add 192.168.2.0/24 via 10.0.2.1
        - apk add --no-cache dnsmasq iptables
        - iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
        - dnsmasq -C /etc/dnsmasq-spine.conf
    leaf1:
      kind: openwrt
      env:
        NICS: 4
    leaf2:
      kind: openwrt
      env:
        NICS: 4
    client1:
      kind: linux
      exec:
        - ip link set address 00:c1:ab:00:00:01 dev eth1
        - ip addr add 192.168.1.10/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.1.1 dev eth1
    client2:
      kind: linux
      exec:
        - ip link set address 00:c1:ab:00:00:02 dev eth1
        - ip addr add 192.168.2.10/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.2.1 dev eth1

  links:
    # spine-leaf uplinks
    - endpoints: ["leaf1:eth1", "spine1:eth1"]
    - endpoints: ["leaf2:eth1", "spine1:eth2"]
    # client links
    - endpoints: ["client1:eth1", "leaf1:eth2"]
    - endpoints: ["client2:eth1", "leaf2:eth2"]
