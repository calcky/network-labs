# topology documentation: http://containerlab.dev/lab-examples/ext-bridge/
name: linux-bridge
prefix: ""

topology:
  kinds:
    linux:
      image: ghcr.io/srl-labs/network-multitool
  nodes:
    client1:
      kind: linux
      exec:
        - ip link set address 00:c1:ab:00:00:01 dev eth1
        - ip addr add 192.168.100.1/24 dev eth1
    client2:
      kind: linux
      exec:
        - ip link set address 00:c1:ab:00:00:02 dev eth1
        - ip addr add 192.168.100.2/24 dev eth1
    client3:
      kind: linux
      exec:
        - ip link set address 00:c1:ab:00:00:03 dev eth1
        - ip addr add 192.168.100.3/24 dev eth1
    # 节点名必须和宿主机上预先创建的 Linux bridge 同名,由 lab.sh up 自动创建
    br01:
      kind: bridge

  # 注意:桥侧接口名不能用 eth1/eth2/eth3,会与 WSL2/物理机的常见网卡名冲突
  # 这里统一用 br01-cN 作为桥侧 veth 名,落在宿主机 root netns 里
  links:
    - endpoints: ["client1:eth1", "br01:br01-c1"]
    - endpoints: ["client2:eth1", "br01:br01-c2"]
    - endpoints: ["client3:eth1", "br01:br01-c3"]
