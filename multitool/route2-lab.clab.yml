name: multitool-route2
prefix: ""

topology:
  kinds:
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    router:
      kind: linux
      exec:
        - ip addr add 10.0.0.1/24 dev eth1
        - ip route add 192.168.0.0/24 via 10.0.0.2 dev eth1
        - ip addr add 10.0.1.1/24 dev eth2
        - ip route add 192.168.1.0/24 via 10.0.1.2 dev eth2
        - sysctl -w net.ipv4.ip_forward=1
    leaf1:
      kind: linux
      exec:
        - ip addr add 10.0.0.2/24 dev eth1
        - ip addr add 192.168.0.1/24 dev eth2
        - iptables -t nat -A POSTROUTING -o eth1 -j MASQUERADE
        - sysctl -w net.ipv4.ip_forward=1
        - ip route del default
        - ip route add default via 10.0.0.1 dev eth1
    leaf2:
      kind: linux
      exec:
        - ip addr add 10.0.1.2/24 dev eth1
        - ip addr add 192.168.1.1/24 dev eth2
        - iptables -t nat -A POSTROUTING -o eth1 -j MASQUERADE
        - sysctl -w net.ipv4.ip_forward=1
        - ip route del default
        - ip route add default via 10.0.1.1 dev eth1
    client1:
      kind: linux
      exec:
        - ip link set address 00:c1:ab:00:00:05 dev eth1
        - ip addr add 192.168.0.2/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.0.1 dev eth1
    client2:
      kind: linux
      exec:
        - ip link set address 00:c1:ab:00:00:06 dev eth1
        - ip addr add 192.168.1.2/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.1.1 dev eth1

  links:
    # leaf links
    - endpoints: ["client1:eth1", "leaf1:eth2"]
    - endpoints: ["client2:eth1", "leaf2:eth2"]
    # router links
    - endpoints: ["leaf1:eth1", "router:eth1"]
    - endpoints: ["leaf2:eth1", "router:eth2"]
